name: "Tests: Parsers"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  parsers:
    name: Parsers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run parser tests
        run: python -m pytest tests/test_parsers.py -v
