name: "Tests: Detectors"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detectors:
    name: Detectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run detector tests
        run: >
          python -m pytest
          tests/test_detectors.py
          tests/test_tool_thrashing.py
          -v
